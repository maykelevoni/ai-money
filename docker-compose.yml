services:
  app:
    build: .
    container_name: postforge-app
    restart: unless-stopped
    # Loads config/.env locally if present; on managed platforms (Hostinger)
    # set the same vars via the container's environment editor instead.
    env_file:
      - path: config/.env
        required: false
    volumes:
      - app_data:/app/data          # SQLite engine.db persists across restarts
      - app_landers:/app/landers     # generated landing pages persist
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    # Caddyfile is baked into this image (see Dockerfile.caddy) — no file mount.
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: postforge-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data             # TLS certs persist (avoid LE rate limits)
      - caddy_config:/config

volumes:
  app_data:
  app_landers:
  caddy_data:
  caddy_config:
